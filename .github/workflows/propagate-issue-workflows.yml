name: Propagate Issue Workflows to Repos

on:
  push:
    branches: [main]
    paths:
      - 'workflow-templates/issue-content-handler.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UPDATE_WORK_FLOW_ID }}
          private-key: ${{ secrets.UPDATE_WORK_FLOW_PRIVATE_KEY }}
          owner: energy-modelling-tools

      - name: Propagate calling workflow to org repos
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 - << 'PYEOF'
          import base64, json, os, sys, urllib.request, urllib.error

          TOKEN = os.environ["TOKEN"]
          WORKFLOW_FILE = "workflow-templates/issue-content-handler.yml"
          TARGET_PATH = ".github/workflows/issue-content-handler.yml"
          COMMIT_MSG = "Add/update issue content handler workflow from org template"

          with open(WORKFLOW_FILE, "rb") as f:
              content = base64.b64encode(f.read()).decode("ascii")

          repos = [
              "energy-modelling-tools/ffrm",
              "energy-modelling-tools/nismod",
              "energy-modelling-tools/osemosys",
              "energy-modelling-tools/fintrack",
              "energy-modelling-tools/finplan",
              "energy-modelling-tools/minfin",
              "energy-modelling-tools/onsset",
              "energy-modelling-tools/pathcalc",
              "energy-modelling-tools/onstove",
              "energy-modelling-tools/clews",
              "energy-modelling-tools/energy-modelling-tools.github.io",
          ]

          headers = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          failures = {}
          for repo in repos:
              url = f"https://api.github.com/repos/{repo}/contents/{TARGET_PATH}"

              # Check if file already exists and get its SHA
              sha = None
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      existing = json.loads(resp.read())
                  sha = existing.get("sha")
                  # GitHub's API returns base64 content with newlines every 60 chars;
                  # strip those to compare against our single-line base64 string.
                  existing_content = existing.get("content", "").replace("\n", "")
                  if existing_content == content:
                      print(f"⏭️  No change needed for {repo}")
                      continue
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      sha = None
                  else:
                      msg = e.read().decode("utf-8", errors="replace")
                      print(f"❌ Failed to check {repo}: HTTP {e.code}: {msg}")
                      failures[repo] = f"GET HTTP {e.code}: {msg}"
                      continue

              payload = {"message": COMMIT_MSG, "content": content}
              if sha:
                  payload["sha"] = sha

              data = json.dumps(payload).encode("utf-8")
              put_headers = {**headers, "Content-Type": "application/json"}
              req = urllib.request.Request(url, data=data, headers=put_headers, method="PUT")
              try:
                  with urllib.request.urlopen(req) as resp:
                      action = "Updated" if sha else "Created"
                      print(f"✅ {action} {repo}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"❌ Failed for {repo} (HTTP {e.code}): {body}")
                  failures[repo] = f"PUT HTTP {e.code}: {body}"

          if failures:
              print("\nFailed repos and reasons:")
              for repo, reason in failures.items():
                  print(f"  {repo}: {reason}")
              sys.exit(1)
          PYEOF
